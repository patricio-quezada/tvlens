<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVLens</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; }
        header { padding: 2rem; text-align: center; }
        header h1 { font-size: 2rem; color: #00b4d8; }
        header p { color: #888; margin-top: 0.5rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            padding: 0 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card { text-align: center; }
        .card img {
            width: 100%;
            border-radius: 8px;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #1a1a1a;
        }
        .card h3 { font-size: 0.9rem; margin-top: 0.5rem; }
        .card .rating { color: #fbbf24; font-size: 0.85rem; }
        .empty { text-align: center; padding: 4rem 2rem; color: #666; }
    </style>
</head>
<body>
    <header>
        <h1>TVLens</h1>
        <p>MovieLens-inspired TV show recommendations</p>
    </header>
    {% if shows %}
    <div class="grid">
        {% for show in shows %}
        <div class="card">
            {% if show.poster_url %}
            <img src="{{ show.poster_url }}" alt="{{ show.name }}">
            {% else %}
            <img src="" alt="{{ show.name }}">
            {% endif %}
            <h3>{{ show.name }}</h3>
            <div class="rating">★ {{ show.vote_average|floatformat:1 }}</div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="empty">
        <p>No shows yet. Run <code>python manage.py ingest_shows</code> to get started.</p>
    </div>
    {% endif %}
</body>
</html>

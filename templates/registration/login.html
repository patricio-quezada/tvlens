{% extends "base.html" %}
{% block title %}Log in — TVLens{% endblock %}
{% block content %}
<div class="form-card">
    <h1>Log in</h1>
    <form method="post">{% csrf_token %}{{ form.as_p }}<button type="submit">Log in</button></form>
    <p><a href="{% url 'password_reset' %}">Forgot password?</a></p>
    <p>New here? <a href="{% url 'register' %}">Create an account</a>.</p>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Set new password — TVLens{% endblock %}
{% block content %}
<div class="form-card">
    {% if validlink %}
    <h1>Set a new password</h1>
    <form method="post">{% csrf_token %}{{ form.as_p }}<button type="submit">Save password</button></form>
    {% else %}
    <h1>Link expired</h1>
    <p style="color:#888;">This reset link is invalid or already used. <a href="{% url 'password_reset' %}">Request a new one</a>.</p>
    {% endif %}
</div>
{% endblock %}

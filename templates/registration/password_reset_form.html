{% extends "base.html" %}
{% block title %}Reset password — TVLens{% endblock %}
{% block content %}
<div class="form-card">
    <h1>Reset your password</h1>
    <p style="color:#888;">Enter your email — we'll send you a link to set a new password.</p>
    <form method="post">{% csrf_token %}{{ form.as_p }}<button type="submit">Send reset link</button></form>
</div>
{% endblock %}

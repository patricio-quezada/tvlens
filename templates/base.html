<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TVLens{% endblock %}</title>
    <style>
        :root {
            /* Pantone 2026 Color of the Year — Cloud Dancer (PANTONE 11-4201) */
            --cloud-dancer: #f0eee6;
            --cloud-dancer-muted: #a8a195;
            --cloud-dancer-deep: #7a7468;

            /* Warm dark theme — Cloud Dancer's dark companion */
            --bg: #1a1814;
            --surface: #26221c;
            --surface-2: #2e2a22;
            --border: #3a352d;

            /* Foreground */
            --text-primary: var(--cloud-dancer);
            --text-secondary: var(--cloud-dancer-muted);
            --text-tertiary: var(--cloud-dancer-deep);

            /* Accents — warm gold (complementary to Cloud Dancer's cream) */
            --accent: #d4a574;
            --accent-soft: rgba(212, 165, 116, 0.15);
            --accent-glow: rgba(212, 165, 116, 0.35);
            --rating: #c89b5a;

            /* Semantic */
            --error: #e89180;
            --success: #a8c490;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text-primary); line-height: 1.5; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        code { background: var(--surface); padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.9rem; }

        nav { padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; gap: 1.5rem; align-items: center; background: var(--bg); }
        nav .brand { font-weight: 700; color: var(--accent); margin-right: auto; font-size: 1.1rem; letter-spacing: 0.02em; }
        nav .user { color: var(--text-secondary); }
        nav form { display: inline; }
        nav button { background: none; border: none; color: var(--accent); cursor: pointer; font-family: inherit; font-size: inherit; padding: 0; }
        nav button:hover { text-decoration: underline; }

        main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        .form-card { max-width: 400px; margin: 2rem auto; }
        .form-card h1 { margin-bottom: 1rem; }
        .form-card p { margin-top: 0.75rem; }
        .form-card label { color: var(--text-secondary); font-size: 0.85rem; display: block; margin-top: 0.5rem; }
        .form-card input, .form-card textarea { width: 100%; padding: 0.5rem; margin-top: 0.25rem; background: var(--surface); border: 1px solid var(--border); color: var(--text-primary); border-radius: 4px; font-family: inherit; font-size: 1rem; }
        .form-card input:focus, .form-card textarea:focus { outline: none; border-color: var(--accent); }
        .form-card button[type=submit] { margin-top: 1.5rem; padding: 0.6rem 1.2rem; background: var(--accent); border: none; color: var(--bg); border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.95rem; }
        .form-card button[type=submit]:hover { filter: brightness(1.08); }
        .form-card .errorlist { color: var(--error); font-size: 0.85rem; margin: 0.25rem 0; padding-left: 1rem; }
        .form-card .helptext { color: var(--text-tertiary); font-size: 0.75rem; display: block; margin-top: 0.25rem; }

        .messages { list-style: none; margin-bottom: 1rem; }
        .messages li { padding: 0.5rem 1rem; background: var(--accent-soft); border-left: 3px solid var(--accent); border-radius: 4px; margin-bottom: 0.5rem; color: var(--text-primary); }

        .page-header { text-align: center; margin-bottom: 2rem; }
        .page-header h1 { font-size: 2rem; color: var(--accent); letter-spacing: 0.02em; }
        .page-header p { color: var(--text-secondary); margin-top: 0.5rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }

        .row { margin-bottom: 2.5rem; }
        .row-title { font-size: 1.2rem; margin-bottom: 0.75rem; color: var(--text-primary); font-weight: 600; letter-spacing: 0.01em; }
        .row-scroller {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scroll-snap-type: x mandatory;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
            align-items: start;
        }
        .row-scroller .card {
            flex: 0 0 180px;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .card { text-align: center; }
        .card-poster { position: relative; }
        .card-poster img { display: block; width: 100%; border-radius: 8px; aspect-ratio: 2/3; object-fit: cover; background: var(--surface); }
        .poster-placeholder { width: 100%; aspect-ratio: 2/3; border-radius: 8px; background: var(--surface); }
        .card-poster::after {
            content: "";
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 35%;
            background: linear-gradient(to top, rgba(26, 24, 20, 0.85), transparent);
            pointer-events: none;
            border-radius: 0 0 8px 8px;
        }
        .poster-rating {
            position: absolute;
            left: 50%;
            bottom: 0.5rem;
            transform: translateX(-50%);
            font-size: 0.78rem;
            color: rgba(240, 238, 230, 0.92);
            font-weight: 500;
            letter-spacing: 0.04em;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);
            z-index: 1;
            white-space: nowrap;
        }
        .poster-rating.empty { color: rgba(240, 238, 230, 0.5); font-style: italic; }

        .card-title { display: flex; align-items: center; justify-content: center; }
        .row-scroller .card h3 { font-size: 0.9rem; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--text-primary); text-align: center; margin: 0; }
        .card-meta { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
        .card-year { color: var(--text-tertiary); font-size: 0.75rem; }
        .card-genres { display: flex; gap: 0.25rem; flex-wrap: wrap; justify-content: center; }
        .card-genre { background: var(--surface); color: var(--text-secondary); font-size: 0.65rem; padding: 0.15rem 0.45rem; border-radius: 4px; white-space: nowrap; border: 1px solid transparent; }
        .card-genre.favorite { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-glow); }

        .genre-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .genre-pill { padding: 0.4rem 0.8rem; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; font-size: 0.85rem; color: var(--accent); display: inline-flex; align-items: center; gap: 0.4rem; }
        .genre-pill:hover { background: var(--surface-2); text-decoration: none; }
        .genre-pill span { color: var(--text-tertiary); font-size: 0.75rem; }
        .genre-pill.favorite { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .genre-pill.favorite::before { content: "★ "; color: var(--accent); margin-right: 0.1rem; }

        /* Empty-state row */
        .row-empty {
            padding: 1.75rem 1.25rem;
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            text-align: center;
        }
        .row-empty p { font-size: 0.95rem; margin-bottom: 0.5rem; }
        .empty-cta { color: var(--accent); font-size: 0.9rem; font-weight: 500; }

        .empty { text-align: center; padding: 4rem 2rem; color: var(--text-tertiary); }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'shows:index' %}" class="brand">TVLens</a>
        {% if user.is_authenticated %}
            <span class="user">{{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button type="submit">Logout</button></form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>
    <main>
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}<li>{{ message }}</li>{% endfor %}
        </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
